<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Home - Hi, I'm Tyl</title>
    <link href="https://fonts.googleapis.com/css2?family=Gochi+Hand&family=Indie+Flower&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body {
            margin: 0;
            padding: 5vw; /* This creates a 20px gap on all 4 sides */
            box-sizing: border-box; /* Crucial: This ensures the padding doesn't make the page wider than the screen */
            display: flex;
            overflow-x: hidden;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            width: 100vw;
            font-family: "Courier Prime", "Courier New", Courier, monospace; /* */
            color: black; 
            background-color: #8fa9c4; /* */
            background-image: repeating-linear-gradient(
                to bottom,
                transparent,
                transparent 38px,
                rgba(0, 0, 0, 0.2) 38px,
                rgba(0, 0, 0, 0.2) 40px
            );
            background-size: 100% 40px; /* */
        }

        .main-content {
            text-align: center;
            width: 90%;
            max-width: 600px;
        }

        h1 {
            font-family: 'Indie Flower', cursive;
            font-size: clamp(1.8rem, 8vw, 3.5rem);
            line-height: 1.2;
            margin: 0 0 50px 0;
            font-weight: bold;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .tilted-heart {
            display: inline-block; /* Required for rotation to work */
            transform: rotate(-15deg); /* Negative numbers tilt left, positive tilt right */
            margin-left: 20px; /* Adjust this to move it closer or further */
            font-size: 1.2em; /* Optional: makes the heart slightly smaller to match the text better */
        }
        
        /* Container to align them side-by-side */
        .stats-wrapper {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 12px;
            flex-wrap: wrap;
            margin: 50px; /* between ig and new poem is up */
        }

        /* 🎨 Instagram: Thick Outer Border style */
        .ig-btn-styled {
            background: #567189;
            border: 5px solid #4a5e71; /* The outer "ring" look */
            color: white;
            border-radius: 40px;
            padding: 8px 15px;
            font-size: 1.2rem;
            display: flex;
            align-items: center;
            text-decoration: none;
            transition: 0.2s;
        }

        .ig-btn-styled:hover {
            transform: scale(1.1);
            opacity: 0.9;
        }

        /* 👁️ Views: Solid Color Pill (No thick border) */
        .views-pill-solid {
            background: #4a5e71; /* Same color as button */
            border:5px solid #4a5e71;
            color: white;
            border-radius: 40px;
            padding: 10px 20px; /* Slightly more padding since no border */
            font-family: "Courier Prime", monospace;
            font-weight: bold;
            font-size: 1rem;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        
        /* 🌊 This leans the megaphone up and gives it breathing room */
        .megaphone-icon {
            display: inline-block; /* Required for rotate to work */
            transform: rotate(-20deg); /* 🌊 Negative value tilts it 'up' to the left */
            margin-right: 5px; /* Adds space before your text */
            font-size: 1.5rem; /* Adjust size to match your Indie Flower text */
        }

        .tea-icon {
            color: transparent;
            margin-right: 13px; 
            color: #000; 
            font-size: 1.8rem; /* 🌊 Matches the scale of your tea-section font */
        }

        .sub-text {
            font-family: 'Indie Flower', cursive;
            font-size: clamp(1.1rem, 4vw, 1.6rem);
            margin: 5px 0;
            font-weight: bold;
        }
        
        /* ❤️ Read Now Button styled like your reference */
        .read-btn {
            width: 30%;
            background: #567189;
            border: 5px solid #4a5e71;
            color: white;
            border-radius: 40px;
            padding: 8px;
            font-family: "Courier Prime", "Courier New", Courier, monospace;
            font-size: 1rem;
            font-weight: bold;
            cursor: pointer;
            margin: 20px 0 50px 0;
            transition: 0.2s;
        } 

        .read-btn:hover { 
            opacity: 0.8;
            transform: scale(1.05);
        }

        /* More Poems Button */
        .more-btn {
            width: 30%;
            background: #567189; /* */
            border: 5px solid #4a5e71;
            color: white;
            border-radius: 40px;
            padding: 8px;
            font-family: "Courier Prime", "Courier New", Courier, monospace;
            font-size: 1rem;
            font-weight: bold;
            cursor: pointer;
            margin: 20px 0 50px 0;
            transition: 0.2s;
        } 

        .more-btn:hover { 
            opacity: 0.8;
            transform: scale(1.05);
        }

        /* Container for alignment */
        .dropdown-container {
            position: relative;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* The actual list styling */
        .dropdown-content {
            display: none; /* Hidden by default */
            background: white;
            border: 2px solid black; /* Matches your bold border style */
            border-radius: 15px;
            width: 85%;
            max-width: 250px;
            z-index: 10;
            margin-top: -40px; /* Pulls it closer to the button */
            margin-bottom: 20px;
            padding: 10px 0;
        }

        /* The links inside the dropdown */
        .dropdown-content a {
            display: block;
            color: black;
            padding: 10px;
            text-decoration: none;
            font-family: "Courier Prime", "Courier New", Courier, monospace;
            font-size: 0.9rem;
            border-bottom: 1px solid rgba(0,0,0,0.1);
        }

        .dropdown-content a:last-child {
            border-bottom: none;
        }

        .dropdown-content a:hover {
            background-color: #8fa9c4; 
        }

        /* The magic class we will toggle with JS */
        .show {
            display: block !important;
        }

        .tea-section {
            display: block;
            font-family: 'Indie Flower', cursive;
            font-size: 2rem;
            margin-top: 10px;
            font-weight: bold;
        }

        .quote {
            font-family: "Courier Prime", "Courier New", Courier, monospace;
            font-size: 1rem;
            font-weight: bold;
            letter-spacing: 1px;
            line-height: 1.5;
            margin: 20px 0 50px 0;
        }
    </style>
</head>
<body>

    <div class="main-content">
        <h1>Hi, I'm Tyl <span class="tilted-heart">𖹭</span></h1>

       <div class="stats-wrapper">
            <a href="https://instagram.com/tyljohna" target="_blank" class="ig-btn-styled">
                <i class="fa-brands fa-instagram"></i>
            </a>
            
            <div class="views-pill-solid">
                <i class="fa-solid fa-eye"></i>
                <span class="view-count">...</span>
            </div>
        </div>

        <p class="sub-text">
            <i class="fa-solid fa-bullhorn megaphone-icon"></i> new poem is up!
        </p>
        <p class="sub-text">'too sweet salted caramel'</p>
        <button class="read-btn" onclick="location.href='tssc-fill.html'">Read Now</button>
        
        <div class="dropdown-container">
            <p class="sub-text">& if u still have time</p>
            <button class="more-btn" id="more-poems-btn">More Poems</button>
            <div class="dropdown-content" id="poems-dropdown">
                <a href="bbt-fill.html">beneath brows tight</a>
            </div>
        </div>
        <div class="tea-section">
            <i class="fa-regular fa-comment-dots tea-icon"></i>so what's tea?
        </div>
        <p class="quote">
            hello</p>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

    <script src="supabase-config.js"></script>

    <script src="script.js"></script>

</body>
</html>
